<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">AutoFlora Smart Irrigation Architecture</title>
  <desc id="desc">A visual diagram of sensors feeding an Arduino irrigation controller that switches a water pump.</desc>
  <rect width="1200" height="620" rx="32" fill="#f7fee7"/>
  <circle cx="1040" cy="120" r="170" fill="#dcfce7"/>
  <circle cx="130" cy="540" r="170" fill="#dbeafe"/>
  <text x="70" y="86" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="700" fill="#1f3f2b">AutoFlora</text>
  <text x="70" y="128" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#52616b">IoT irrigation logic for roadside plantation and urban greenery.</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="485" y="235" width="230" height="150" rx="22" fill="#1f3f2b"/>
    <text x="540" y="300" font-size="30" font-weight="700" fill="#ffffff">Arduino</text>
    <text x="535" y="335" font-size="20" fill="#bbf7d0">Decision Engine</text>
    <g fill="#ffffff" stroke="#bbf7d0">
      <rect x="80" y="205" width="230" height="72" rx="16"/>
      <rect x="80" y="315" width="230" height="72" rx="16"/>
      <rect x="80" y="425" width="230" height="72" rx="16"/>
      <rect x="890" y="205" width="230" height="72" rx="16"/>
      <rect x="890" y="315" width="230" height="72" rx="16"/>
      <rect x="890" y="425" width="230" height="72" rx="16"/>
    </g>
    <g fill="#1f3f2b" font-size="22" font-weight="700">
      <text x="120" y="250">Soil moisture</text>
      <text x="125" y="360">DHT22 weather</text>
      <text x="126" y="470">Tank level</text>
      <text x="940" y="250">Relay</text>
      <text x="940" y="360">Water pump</text>
      <text x="940" y="470">Flow telemetry</text>
    </g>
    <g stroke="#22c55e" stroke-width="7" stroke-linecap="round" fill="none">
      <path d="M315 241 H470"/>
      <path d="M315 351 H470"/>
      <path d="M315 461 C390 461 405 385 470 350"/>
      <path d="M720 310 H875"/>
      <path d="M1005 285 V310"/>
      <path d="M1005 392 V425"/>
    </g>
    <rect x="445" y="455" width="310" height="76" rx="18" fill="#ffffff" stroke="#bbf7d0"/>
    <text x="475" y="502" font-size="22" font-weight="700" fill="#1f3f2b">Safe watering decisions</text>
  </g>
</svg>

