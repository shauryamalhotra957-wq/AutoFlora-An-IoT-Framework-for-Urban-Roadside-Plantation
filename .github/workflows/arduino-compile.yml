name: Arduino compile

on:
  push:
    paths:
      - .github/workflows/arduino-compile.yml
      - roadside_plant_watering_system.ino
  pull_request:
    paths:
      - .github/workflows/arduino-compile.yml
      - roadside_plant_watering_system.ino

permissions:
  contents: read

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Stage sketch using the Arduino folder convention
        run: |
          mkdir -p .arduino-ci/roadside_plant_watering_system
          cp roadside_plant_watering_system.ino \
            .arduino-ci/roadside_plant_watering_system/roadside_plant_watering_system.ino
      - name: Compile for Arduino Uno
        uses: arduino/compile-sketches@90cd8facf85be01416269d4192dc6df889cefbb8 # v1.1.3
        with:
          cli-version: "1.5.1"
          fqbn: arduino:avr:uno
          platforms: |
            - name: arduino:avr
              version: 1.8.8
          libraries: |
            - name: DHT sensor library
              version: 1.4.7
          sketch-paths: |
            - .arduino-ci
          enable-warnings-report: true
